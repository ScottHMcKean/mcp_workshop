command:
  - "uvicorn"
  - "main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: warehouse_id   # bind the workspace's serverless warehouse at deploy time
  - name: WORKSHOP_CATALOG
    value: workspace
  - name: WORKSHOP_SCHEMA
    value: default

# Tell the Apps platform to forward the calling user's identity. Without this,
# X-Forwarded-Access-Token is never set and the App can only run as its own
# service principal. Required for the workshop's identity-passthrough story.
user_authorization:
  scopes:
    - all-apis
